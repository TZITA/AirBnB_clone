<!DOCTYPE html>
<html lang="en">
        <head>
                <title>AirBnB Clone</title>
                <link rel="stylesheet" href="2-common.css">
                <link rel="stylesheet" href="2-header.css">
                <link rel="stylesheet" href= "2-footer.css">
                <link rel="stylesheet" href= "2-filter.css">
                <link rel="icon" href="images/icon.png">
        </head>
        <body>
                <header></header>
                <div class="container">
                        <section class="filters">
                                <button type="button">
                                        Search
                                </button>
                                <div class="locations">
                                        <h3>States</h3>
                                        <h4>California, New York...</h4>
                                        <div class="popover">
                                                <h2>California</h2>
                                                <ul>
                                                        <li>ABCD</li>
                                                        <li>EFGH</li>
                                                        <li>IJKL</li>
                                                </ul>
                                                <h2>New York</h2>
                                                <ul>
                                                        <li>MNOP</li>
                                                        <li>QRST</li>
                                                        <li>UVWX</li>
                                                </ul>
                                        </div>       
                                </div>
                                <div class="amenities">
                                        <h3>Amenities</h3>
                                        <h4>Single room, Double room...</h4>
                                        <div class="popover">
                                                <ul>
                                                        <li>Shower</li>
                                                        <li>Iron</li>
                                                        <li>TV set</li>
                                                </ul>
                                        </div>
                                </div>
                        </section>
			</section>
                        <section class="places">
                                <h1>Places</h1>
                                <article>
                                        <h2>Home</h2>
                                </article>
                                <article>
                                        <h2>Tiny House</h2>
                                </article>
                                <article>
                                        <h2>Presidential suite</h2>
                                </article>
                        </section>
                </div>
                <footer>Best School</footer>
        </body>
</html>
